name: Daily Opportunity Update

on:
  # GitHub's scheduler is best-effort and frequently drifts hours away from
  # the cron time below — that's a documented GitHub platform limitation,
  # confirmed by GitHub staff in community discussions, not a bug here.
  # Earlier this workflow tried to additionally restrict WHICH hour it was
  # allowed to run in, but since the schedule itself can't be trusted to
  # fire on time, stacking a strict time-window on top of it just means
  # auto-runs get skipped most days. Window restriction has been removed —
  # this now simply runs whenever GitHub fires the schedule, once a day,
  # plus any time you click "Run workflow" manually.
  schedule:
    - cron: '0 10 * * *'   # requested time: ~10:00 UTC — actual fire time may drift
  workflow_dispatch:        # Manual "Run workflow" button — always works, any time

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run collector
        run: node run.js
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SERPER_KEY: ${{ secrets.SERPER_KEY }}

      - name: Commit updated database
        run: |
          git config user.name  "Opportunity Radar Bot"
          git config user.email "bot@opportunity-radar.local"
          git add data/opportunities.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
