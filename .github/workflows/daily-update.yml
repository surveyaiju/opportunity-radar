name: Daily Opportunity Scraper

on:
  schedule:
    # Runs at 1:00 AM PST every day (9:00 AM UTC)
    - cron: '0 9 * * *' 
  workflow_dispatch:
    # Allows you to click a button to run it manually anytime

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Collector Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm start

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          # Only commit if there are actually changes to avoid failing the action
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: add new AI-curated opportunities" && git push)
