name: Daily Opportunity Update

on:
  schedule:
    - cron: '0 8 * * *'   # Every day at 8:00 AM UTC
  workflow_dispatch:        # Also allows manual "Run workflow" button in GitHub

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit updated opportunities.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run collector
        run: node run.js
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SERPER_KEY: ${{ secrets.SERPER_KEY }}

      - name: Commit updated database
        run: |
          git config user.name  "Opportunity Radar Bot"
          git config user.email "bot@opportunity-radar.local"
          git add data/opportunities.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
