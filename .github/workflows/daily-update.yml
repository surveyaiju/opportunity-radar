name: Daily Opportunity Update

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 AM UTC every day
  workflow_dispatch:        # Also allows manual run from GitHub Actions tab

permissions:
  contents: write           # Needed to commit updated opportunities.json

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run opportunity collector
        run: node collector/main.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d) [skip ci]"
          git push
